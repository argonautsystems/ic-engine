# SPDX-License-Identifier: Apache-2.0
# CI for argonautsystems/ic-engine — ARGOS self-hosted shell runner
#
# RELEASE RITUAL: version tags (vX.Y.Z) MUST be pushed to GitLab — this is
# the only place release images get built. Tags that only land on GitHub
# produce no images (v4.2.x–v4.6.0 shipped amd64-only hand-pushed images
# because their tags never reached GitLab; that broke Apple Silicon).
# Push order per fleet policy: ARGONAS, then GitLab (CI fires), then GitHub.
#
# Runner: ARGOS (192.168.207.22) — Docker 29 + buildx 0.30, shell executor.
# No Docker-in-Docker needed; jobs run directly on the ARGOS host shell.
#
# Requires GitLab CI/CD variables (Settings → CI/CD → Variables):
#   GHCR_USER  — github username (perlowja)
#   GHCR_PAT   — GitHub PAT with write:packages scope (masked + protected)

workflow:
  rules:
    # Skip CI on transient/snapshot branches that otherwise flood the shared
    # ARGOS runner: hive/* + zcbuild/* worker branches, archive/* job-result
    # snapshots, wip/* scratch. CI runs only on default branch, MRs, and tags.
    - if: $CI_COMMIT_BRANCH =~ /^(hive|zcbuild|archive|wip)/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - manifest
  - publish-record

variables:
  REGISTRY: ghcr.io
  IMAGE_NAME: argonautsystems/ic-engine
  DOCKER_BUILDKIT: "1"

# ── Lint ──────────────────────────────────────────────────────────────────
# Shell executor: run hadolint via docker on the host (no image: needed).
lint:dockerfile:
  stage: lint
  tags: [argos, ncz-os]
  script:
    - docker run --rm -i hadolint/hadolint:latest < Dockerfile || true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:compose:
  stage: lint
  tags: [argos, ncz-os]
  script:
    - docker compose -f compose.yml config --quiet
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Test ──────────────────────────────────────────────────────────────────
# Restored 2026-06-06: the repo consolidation (1bc986a) replaced this file
# with the runtime repo's tag-only CI, which silently dropped unit-tests —
# branch pushes ran no validation at all. All dependencies (incl. clio) are
# vendored in-tree, so no CI_JOB_TOKEN git rewrite is needed anymore.
unit-tests:
  stage: test
  tags: [argos, ncz-os]
  before_script:
    - export PATH="/usr/local/bin:/home/jasonperlow/.local/bin:$PATH"
  script:
    - uv sync --frozen
    # Tests under tests/ also import investorclaw_bridge (the MCP/dashboard
    # layer), which is a separate package with its own deps (structlog,
    # fastapi, ...). Install it editable into the same venv, as the
    # Dockerfile does in the image.
    - uv pip install -e ./bridge
    - uv run investorclaw --version
    - uv run python -c "import ic_engine; print(f'ic_engine v{ic_engine.__version__}')"
    - uv run python -c "import clio; print('vendored clio import ok')"
    # Pytest collection (verifies imports work; doesn't run live network tests)
    - uv run python -m pytest tests/ --collect-only -q
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Build ─────────────────────────────────────────────────────────────────
# Shell executor on ARGOS: docker buildx is available on host.
# Buildx builder named "multiarch" is pre-created on ARGOS with QEMU support.
# If it doesn't exist the before_script creates it once.

.build-common: &build-common
  stage: build
  tags: [argos, ncz-os]
  before_script:
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
    - docker buildx inspect multiarch > /dev/null 2>&1 ||
        (docker run --privileged --rm tonistiigi/binfmt --install all &&
         docker buildx create --name multiarch --driver docker-container --use &&
         docker buildx inspect --bootstrap)
    - docker buildx use multiarch
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

build:amd64:
  <<: *build-common
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      docker buildx build \
        --platform linux/amd64 \
        --build-arg VERSION="${VERSION}" \
        --tag $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        --provenance=false \
        --push \
        .
    - echo "Pushed $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64"

build:arm64:
  <<: *build-common
  timeout: 90m
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      docker buildx build \
        --platform linux/arm64 \
        --build-arg VERSION="${VERSION}" \
        --tag $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64 \
        --provenance=false \
        --push \
        .
    - echo "Pushed $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64"

# ── Manifest ──────────────────────────────────────────────────────────────

manifest:multi-arch:
  stage: manifest
  tags: [argos, ncz-os]
  needs: [build:amd64, build:arm64]
  before_script:
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    # buildx imagetools, NOT `docker manifest create`: the latter refuses
    # children that are themselves manifest lists (e.g. a per-arch tag
    # re-tagged via imagetools), while imagetools flattens nested lists.
    # Hit live on the first 4.6.0 arm64 publish (2026-06-05).
    - |
      docker buildx imagetools create --tag $REGISTRY/$IMAGE_NAME:${VERSION}-cpu \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64
    - |
      docker buildx imagetools create --tag $REGISTRY/$IMAGE_NAME:latest \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64
    - echo "MANIFEST_DIGEST=$(docker buildx imagetools inspect $REGISTRY/$IMAGE_NAME:${VERSION}-cpu --format '{{json .Manifest.Digest}}' | tr -d '\"')" > manifest.env
    - cat manifest.env
  artifacts:
    reports:
      dotenv: manifest.env
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Publish record ────────────────────────────────────────────────────────

publish:release-summary:
  stage: publish-record
  tags: [argos, ncz-os]
  needs: [manifest:multi-arch]
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      cat > release-summary.txt <<SUMMARY
      InvestorClaw v${VERSION} — $(date -u +%Y-%m-%dT%H:%M:%SZ)
      Pipeline: ${CI_PIPELINE_URL}
      Commit:   ${CI_COMMIT_SHA}

      Image (multi-arch manifest list):
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu
        ${REGISTRY}/${IMAGE_NAME}:latest

      Per-arch tags:
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu-amd64
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu-arm64
      SUMMARY
    - cat release-summary.txt
  artifacts:
    paths: [release-summary.txt]
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
